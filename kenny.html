<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>smart</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(to right , #2f344b,#24347a,#425ca5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calculator{
            width: 370px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgb(3, 3, 3);
        }

        .top{
            background: #31638b;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .top h1 {
            margin-bottom: 10px;
            
        }

        .time{
            font-size: 14px;
            color: lightgray;
            
        }

        .display-box{
            padding: 20px;
            background: #222;
        }

        #display{
            width: 100%;
            height: 80px;
            border: none;
            outline: none;
            background: black;
            color: #00ff88;
            font-size: 35px;
            border-radius: 15px;
            text-align: right;
            padding: 15px;

        }

        .buttons{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 10px;
            padding: 20px;
        }

        button{
            height: 65px;
            border: none;
            border-radius: 10px;
            font-size: 30px;
            cursor: pointer;
            transition: 0.9s;
        }

        button:hover{
            transform: scale(1.05);
        }

        .number{
            background: white;
            box-shadow: 0 0 3px;
        }

        .delete{
            background: #00ff88;
            color: white;
        }
        .clear{
            background: orange;
            color: white;
        }
        .operator{
            background: green;
            color: white;
        }

        .equal{
            background: black;
            color: white;
        }

    </style>
  </head>
  <body>
    
    <div class="calculator">

    <!-- TOP -->

    <div class="top">
      <h1>Smart Calculator 🚀</h1>

      <div class="time" id="clock"></div>
    </div>

    <!-- DISPLAY -->

    <div class="display-box">

      <input type="text" id="display" readonly>

    </div>

    <!-- BUTTONS -->

    <div class="buttons">

      <button class="clear" onclick="clearDisplay()">
        C
      </button>

      <button class="delete" onclick="deleteLast()">
        ⌫
      </button>

      <button class="operator" onclick="appendValue('%')">
        %
      </button>

      <button class="operator" onclick="appendValue('/')">
        ÷
      </button>

      <button class="number" onclick="appendValue('7')">7</button>
      <button class="number" onclick="appendValue('8')">8</button>
      <button class="number" onclick="appendValue('9')">9</button>

      <button class="operator" onclick="appendValue('*')">
        ×
      </button>

      <button class="number" onclick="appendValue('4')">4</button>
      <button class="number" onclick="appendValue('5')">5</button>
      <button class="number" onclick="appendValue('6')">6</button>

      <button class="operator" onclick="appendValue('-')">
        -
      </button>

      <button class="number" onclick="appendValue('1')">1</button>
      <button class="number" onclick="appendValue('2')">2</button>
      <button class="number" onclick="appendValue('3')">3</button>

      <button class="operator" onclick="appendValue('+')">
        +
      </button>

      <button class="number" onclick="appendValue('0')">0</button>

      <button class="number" onclick="appendValue('.')">
        .
      </button>

      <button class="equal" onclick="calculate()"> 
        =
      </button>

    </div>

    <!-- HISTORY -->

    <div class="history">

      <h3>History</h3>

      <div id="historyList"></div>

    </div>

    <!-- FOOTER -->

    <footer>
      Made with HTML CSS and JavaScript
    </footer>

  </div>
  <script>
    let display =
    document.getElementById("display");

    let historyList = 
    document.getElementById("historyList");

    //add value

    function appendValue(value) {

        display.value += value;
    }

    //clear


    function clearDisplay() {
        display.value = "";
    }

    //delete

    function deleteLast() {

        display.value =
        display.value.slice(0,-1);
    }

    //calculate

    function calculate() {
        try{
            let expression = display.value;

            let result = eval(expression);

            //history

            historyList.innerHTML +=
            expression + "=" + result + "<br>";

            display.value = result;


        }catch{
            display.value = "error";
        }

    }
    //DIGITAL clock

    function updateClock() {

        let now = new Date();

        let time =
        now.toLocaleTimeString();

        document.getElementById("clock")
        .innerHTML = time;
    }

    setInterval(updateClock,1000);

    


  </script>
  </body>
</html>
